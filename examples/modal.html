<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&lt;pinecall-modal&gt; — call modal demo</title>
    <style>
      body {
        margin: 0; min-height: 100vh;
        background: radial-gradient(circle at 30% 20%, #14131a, #0b0a0e);
        color: #e8e4f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; flex-direction: column; gap: 16px; padding: 40px;
      }
      h1 { font-weight: 600; font-size: 18px; margin: 0; }
      p { color: #9a96a8; max-width: 540px; line-height: 1.6; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      input, select { background:#1a1820; color:#e8e4f0; border:1px solid #333; border-radius:8px; padding:8px 10px; font-size:13px; }
      button.action { background:#cd58b2; color:#fff; border:0; border-radius:8px; padding:9px 16px; font-size:13px; cursor:pointer; }
      #log { font-family: ui-monospace, monospace; font-size:12px; background:#15131a; border:1px solid #2a2730; border-radius:8px; padding:12px; max-height:200px; overflow:auto; white-space:pre-wrap; }
    </style>
  </head>
  <body>
    <h1>&lt;pinecall-modal&gt; — Phase 2a (voice call)</h1>
    <p>
      Click <strong>Open call</strong> (or the floating orb, bottom-right). The modal opens and starts a WebRTC call.
      Use the keyboard button inside the modal to type a message <em>during</em> the call — the bot answers in voice and text.
    </p>

    <div class="row">
      <label>agent <input id="agent" value="web-orb-demo" /></label>
      <label>name <input id="name" value="Mara" /></label>
      <label>preset
        <select id="preset"><option>dark</option><option>midnight</option><option>aurora</option><option>sunset</option><option>light</option></select>
      </label>
      <button class="action" id="open">Open call</button>
    </div>

    <div id="log"></div>

    <!-- the modal element (launcher FAB + modal live in its shadow DOM) -->
    <pinecall-modal id="m"></pinecall-modal>

    <script type="module">
      const log = (m) => { const el = document.getElementById("log"); el.textContent += m + "\n"; el.scrollTop = el.scrollHeight; };
      window.addEventListener("error", (e) => log("❌ " + (e.message || e.error)));
      window.addEventListener("unhandledrejection", (e) => log("❌ " + e.reason));

      const ORIGIN = location.protocol.startsWith("http") ? location.origin : "http://localhost:5050";
      try {
        await import(ORIGIN + "/dist/modal/index.js");
        log("✅ module loaded. <pinecall-modal> defined: " + !!customElements.get("pinecall-modal"));
      } catch (err) { log("❌ failed to import modal — " + err); }

      const m = document.getElementById("m");
      const apply = () => {
        m.setAttribute("agent", document.getElementById("agent").value.trim());
        m.setAttribute("name", document.getElementById("name").value.trim());
        m.setAttribute("preset", document.getElementById("preset").value);
        m.tokenProvider = async () => {
          const r = await fetch(ORIGIN + "/api/token");
          if (!r.ok) throw new Error("token endpoint " + r.status);
          return r.json();
        };
        m.addEventListener("pinecall:status", (e) => log("status: " + e.detail));
      };
      apply();
      document.getElementById("preset").addEventListener("change", apply);
      document.getElementById("open").addEventListener("click", () => { apply(); m.open(); });
    </script>
  </body>
</html>
